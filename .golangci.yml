version: "2"

linters:
  enable:
    # Default-tier: correctness
    - copyloopvar
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused

    # Error handling
    - errorlint
    - nilerr

    # Security — critical for a server exposing local filesystem
    - gosec
    - bidichk
    - bodyclose
    - noctx

    # Code quality
    - gocritic
    - revive
    - unconvert
    - unparam
    - wastedassign
    - prealloc

  settings:
    gosec:
      # Audit mode: stricter analysis, fewer false negatives.
      config:
        global:
          audit: true
      # G104 duplicates errcheck; exclude to avoid double-flagging
      # intentional `_ = err` patterns.
      excludes:
        - G104

    errcheck:
      check-type-assertions: true

    govet:
      enable:
        - shadow

    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style

    errorlint:
      errorf: true
      asserts: true
      comparison: true

  exclusions:
    rules:
      # Test files: relax file-permission checks and httpNoBody noise.
      - path: _test\.go
        linters:
          - gosec
        text: "G301|G306"
      - path: _test\.go
        linters:
          - gocritic
        text: httpNoBody

      # openBrowser: subprocess args are constructed from CLI flags, not
      # user-controlled HTTP input.
      - path: cmd/server/main\.go
        linters:
          - gosec
        text: "G204"

      # CLI flags and env vars flow into log messages and exec.Command;
      # not user-controlled HTTP input.
      - path: cmd/server/main\.go
        linters:
          - gosec
        text: "G702|G706"

      # devProxy: reverse-proxy target is hardcoded localhost:5173.
      - path: cmd/server/main\.go
        linters:
          - gosec
        text: "G704"

      # http.Serve in main: local dev tool, timeouts not needed.
      - path: cmd/server/main\.go
        linters:
          - gosec
        text: "G114"

      # net.Listen in main: CLI entry point, no parent context.
      - path: cmd/server/main\.go
        linters:
          - noctx

      # resolvePath validates containment before os.Stat/Open/ReadFile.
      # Taint-analysis rules (G703, G304, G204) can't see the boundary check.
      - path: internal/server/server\.go
        linters:
          - gosec
        text: "G703|G304|G204|G702"

      # HTML preview response is built from local files, not user input.
      - path: internal/server/server\.go
        linters:
          - gosec
        text: "G705"

formatters:
  enable:
    - gofumpt
    - golines
  settings:
    gofumpt:
      extra-rules: true
    golines:
      max-len: 80
      tab-len: 2

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
