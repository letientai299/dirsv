name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2
        with:
          experimental: true

      - uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: go-${{ runner.os }}-

      - uses: actions/cache@v4
        with:
          path: app/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('app/bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Build and compress frontend assets
        run: mise build:compress

      - name: Cross-compile release binary
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          tag="${GITHUB_REF_NAME}"
          go build -trimpath \
            -ldflags="-s -w -X github.com/letientai299/dirsv/internal/appinfo.tag=${tag}" \
            -o "dirsv${ext}" ./cmd/server

      - name: Package archive
        run: |
          name="dirsv-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "${name}.zip" dirsv.exe
          else
            tar czf "${name}.tar.gz" dirsv
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: dirsv-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dirsv-${{ matrix.goos }}-${{ matrix.goarch }}.*

  publish:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@v2
        with:
          experimental: true

      - name: Generate changelog
        run: mise changelog > changelog.md

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum dirsv-* > checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dirsv-*
            checksums.txt
          body_path: changelog.md
