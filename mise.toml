[tools]
go = "latest"
bun = "latest"
git-cliff = "latest"
golangci-lint = "2"
prek = "latest"
watchexec = "2"

[env]
_.path = ["bin"]

[hooks.enter]
script = '''
{% if os_family() == "unix" %}
if command -v prek >/dev/null 2>&1; then
  if [ -f "$MISE_PROJECT_ROOT/prek.toml" ] && [ -d "$MISE_PROJECT_ROOT/.git" ]; then
    if [ ! -x "$MISE_PROJECT_ROOT/.git/hooks/pre-commit" ]; then
      prek install --install-hooks --config "$MISE_PROJECT_ROOT/prek.toml" --quiet
    fi
  fi
fi
{% endif %}
'''

# -- build / run / dev --

[tasks."build:fe"]
description = "Install deps and build frontend"
dir = "app"
run = ["bun install", "bun run build"]
sources = ["src/**/*", "index.html", "vite.config.ts", "tsconfig.json", "package.json"]
outputs = ["dist/index.html"]

[tasks."build:be"]
description = "Build Go server binary"
depends = ["build:fe"]
run = "go build -o bin/server ./cmd/server"
sources = ["**/*.go", "go.mod", "go.sum", "app/dist/**/*"]
outputs = ["bin/server"]

[tasks.build]
description = "Build frontend and server binary"
alias = "b"
depends = ["build:be"]

[tasks.run]
description = "Run server (builds on the fly)"
run = "go run ./cmd/server"

[tasks."dev:vite"]
description = "Run Vite dev server"
dir = "app"
run = "bun run dev"

[tasks."dev:server"]
description = "Run Go server in dev mode with auto-reload"
run = "watchexec -r -e go -- go run ./cmd/server --no-open --dev"

[tasks.dev]
description = "Run Go server and Vite dev server in parallel"
run = "bun run scripts/dev.ts"

[tasks."build:compress"]
description = "Pre-compress frontend assets with gzip (replaces originals with .gz)"
depends = ["build:fe"]
run = "go run ./cmd/compress app/dist/assets"

[tasks.changelog]
description = "Generate changelog for a tag (default: latest)"
usage = 'arg "[tag]" help="Tag to generate changelog for"'
run = """
if [ -z "${usage_tag:-}" ]; then
  git cliff --latest --strip header
else
  prev=$(git tag --sort=-v:refname | grep -A1 "^${usage_tag}$" | tail -1)
  if [ "$prev" = "$usage_tag" ]; then
    git cliff --strip header "$usage_tag"
  else
    git cliff --strip header "${prev}..${usage_tag}"
  fi
fi
"""

[tasks.release]
description = "Build smallest production binary"
depends = ["build:compress"]
run = """
tag=$(git describe --tags --exact-match 2>/dev/null || true)
CGO_ENABLED=0 go build -trimpath -ldflags="-s -w -X github.com/letientai299/dirsv/internal/appinfo.tag=${tag}" -o bin/dirsv ./cmd/server
"""
sources = ["**/*.go", "go.mod", "go.sum", "app/dist/**/*"]
outputs = ["bin/dirsv"]

# -- test --

[tasks."test:be"]
description = "Run Go tests"
run = "go test -race -cover -count=1 -shuffle=on -timeout=5m ./..."

[tasks."test:fe"]
description = "Run frontend tests"
dir = "app"
run = "bun run test"

[tasks.test]
description = "Run all tests"
alias = "t"
depends = ["test:be", "test:fe"]

# -- lint / fmt --

[tasks."lint:be"]
description = "Lint Go code"
run = "golangci-lint run ./..."

[tasks."lint:fe"]
description = "Lint and check frontend code"
dir = "app"
run = ["bun biome check .", "bunx tsc --noEmit"]

[tasks.lint]
description = "Lint all code"
alias = "l"
depends = ["lint:be", "lint:fe"]

[tasks."fmt:be"]
description = "Format Go code"
run = ["golangci-lint fmt ./...", "golangci-lint run --fix ./..."]

[tasks."fmt:fe"]
description = "Format frontend code"
dir = "app"
run = "bun biome check --write ."

[tasks."fmt:prose"]
description = "Format Markdown, YAML, and JSON files"
dir = "app"
run = "bun prettier --write --ignore-path ../.prettierignore '../**/*.md' '../**/*.{yaml,yml}' '../**/*.json'"

[tasks.fmt]
description = "Format all code"
depends = ["fmt:be", "fmt:fe", "fmt:prose"]

[tasks.clean]
description = "Format all code"
run = "rm -rf bin app/dist"
