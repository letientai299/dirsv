[tools]
go = "latest"
bun = "latest"
golangci-lint = "2"
watchexec = "2"

[env]
_.path = ["bin"]

# -- build / run / dev --

[tasks."build:fe"]
description = "Install deps and build frontend"
dir = "app"
run = ["bun install --frozen-lockfile 2>/dev/null || bun install", "bun run build"]

[tasks."build:be"]
description = "Build Go server binary"
depends = ["build:fe"]
run = "go build -o bin/server ./cmd/server"

[tasks.build]
description = "Build frontend and server binary"
alias = "b"
depends = ["build:be"]

[tasks.run]
description = "Build and run server"
run = "mise build && ./bin/server"

[tasks."dev:install"]
description = "Install frontend dependencies"
dir = "app"
run = "bun install --frozen-lockfile 2>/dev/null || bun install"

[tasks."dev:vite"]
description = "Run Vite dev server"
depends = ["dev:install"]
dir = "app"
run = "bun run dev"

[tasks."dev:server"]
description = "Run Go server in dev mode with auto-reload"
depends = ["dev:install"]
run = "watchexec -r -e go -- go run ./cmd/server --dev --no-open"

[tasks.dev]
description = "Run Go server and Vite dev server in parallel"
run = [
  { tasks = ["dev:vite", "dev:server"] },
]

# -- test --

[tasks.test]
description = "Run Go tests"
alias = "t"
run = "go test -race -cover -count=1 -shuffle=on -timeout=5m ./..."

# -- lint / fmt --

[tasks."lint:be"]
description = "Lint Go code"
run = "golangci-lint run ./..."

[tasks."lint:fe"]
description = "Lint and check frontend code"
dir = "app"
run = ["bun biome check .", "bunx tsc --noEmit"]

[tasks.lint]
description = "Lint all code"
alias = "l"
depends = ["lint:be", "lint:fe"]

[tasks."fmt:be"]
description = "Format Go code"
run = "golangci-lint fmt ./... && golangci-lint run --fix ./..."

[tasks."fmt:fe"]
description = "Format frontend code"
dir = "app"
run = "bun biome check --write ."

[tasks."fmt:md"]
description = "Format Markdown files"
dir = "app"
run = "bun prettier --write '../**/*.md' '!../node_modules' '!../.ai.dump'"

[tasks.fmt]
description = "Format all code"
depends = ["fmt:be", "fmt:fe", "fmt:md"]
